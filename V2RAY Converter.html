<!DOCTYPE html>

    /* ----- СОВРЕМЕННЫЙ ДИЗАЙН ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
      color: #eef2ff;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      min-height: 100vh;
    }

    /* Контейнер-карточка */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.8rem 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      text-align: center;
      background: linear-gradient(135deg, #ffffff, #94a3f8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .sub {
      text-align: center;
      font-size: 0.8rem;
      color: #7f8ea3;
      margin-top: 0.2rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    /* Панель фильтров */
    .filter-panel {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(71, 85, 105, 0.6);
    }
    .geo-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .geo-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #0f172a;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
    }
    #ipGeoToggle {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #3b82f6;
      cursor: pointer;
    }
    #ipGeoLabel {
      font-size: 0.85rem;
      font-weight: 500;
      color: #cbd5e6;
    }
    #geoServiceInput {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      color: #f1f5f9;
      font-size: 0.8rem;
      width: 260px;
      transition: all 0.2s;
    }
    #geoServiceInput:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    }
    .status-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #2dd4bf;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #2dd4bf;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    #btnCountry, #btnPing, #btnSettings {
      background: #1e293b;
      border: none;
      font-size: 1.2rem;
      width: 42px;
      height: 42px;
      border-radius: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    #btnCountry:hover, #btnPing:hover, #btnSettings:hover {
      background: #2d3a52;
      transform: translateY(-2px);
    }
    #filterInput {
      flex: 1;
      min-width: 180px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      color: #f8fafc;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    #filterInput:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    }
    #btnFilter {
      background: #3b82f6;
      border: none;
      padding: 0 1.4rem;
      height: 42px;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 8px rgba(59,130,246,0.2);
    }
    #btnFilter:hover {
      background: #2563eb;
      transform: scale(0.97);
    }

    /* текстовые блоки */
    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%;
      background: #0b1120;
      border: 1.5px solid #2d3a4e;
      border-radius: 1.2rem;
      padding: 1rem;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      resize: vertical;
      transition: 0.2s;
    }
    textarea:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    #inputConfig { border-color: #2e7d64; }
    #outputResult { border-color: #9f4b4b; }

    /* кнопки */
    .buttons-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0 0.5rem;
    }
    .buttons-left, .buttons-right {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      flex: 1;
    }
    .buttons-right {
      justify-content: flex-end;
    }
    button {
      background: #1e293b;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.8rem;
      color: #f1f5f9;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    button:hover {
      background: #2d3a52;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
    #btnConvert { background: #0f3b2c; box-shadow: 0 4px 10px #0f3b2c40; }
    #btnConvert:hover { background: #1e5a42; }
    #btnConvertBack { background: #1e3a8a; }
    #btnTextBase64 { background: #b45309; }
    #btnCopy, #btnDownload { background: #1f2937; border: 1px solid #475569; }
    #btnLoadFile { background: #4b5563; }
    .clear-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .clear-row button {
      flex: 1;
      background: #2d2f42;
      color: #facc15;
    }
    #btnClearInput { border-left: 3px solid #2e7d64; }
    #btnClearOutput { border-left: 3px solid #dc2626; }

    /* попап стран */
    #countryPopup {
      position: absolute;
      top: 80px;
      left: 20px;
      width: 320px;
      max-height: 60vh;
      background: #0f172ad9;
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid #38bdf8;
      overflow: hidden;
      display: none;
      z-index: 100;
      box-shadow: 0 25px 40px -12px black;
    }
    .country-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .country-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .country-item:hover {
      background: #3b82f650;
    }
    .search-container input {
      width: 100%;
      padding: 0.7rem;
      background: #020617;
      border: none;
      color: white;
      border-bottom: 1px solid #3b82f6;
    }

    /* Модалка настроек */
    #settingsModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #settingsContent {
      background: #0f172ad9;
      backdrop-filter: blur(20px);
      width: 90%;
      max-width: 560px;
      border-radius: 2rem;
      padding: 1.8rem;
      border: 1px solid #38bdf8;
      box-shadow: 0 30px 40px rgba(0,0,0,0.5);
      color: #eef2ff;
    }
    #settingsContent h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.2rem 0 0.5rem 0;
      color: #a5f3fc;

      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.2rem;

      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      color: white;

      padding: 0.5rem 1rem;
    }

      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .inline-check label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
    }
    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.8rem;
      justify-content: space-between;
    }
    .modal-actions button {
      background: #2d3e5f;
      flex: 1;
      justify-content: center;
    }

    }
    #closeSettings:hover {
      background: #991b1b;
    }

    #ipWsToggle, #ipSniToggle, #btnDedup {

      width: auto;
      left: auto !important;
      bottom: auto !important;
    }

      body { padding: 0.8rem; }
      .app-container { padding: 1rem; }
      .geo-row { flex-direction: column; align-items: stretch; }
      .buttons-left, .buttons-right { justify-content: center; }
      .clear-row { flex-direction: column; }

<body>
<div class="app-container">
  <h1>⚡ V2RAY Converter</h1>
  <div class="sub">Vmess · Vless · Trojan · Shadowsocks · WireGuard · Hysteria2</div>

  <div class="filter-panel">
    <div class="geo-row">
      <div class="geo-check">
        <input type="checkbox" id="ipGeoToggle">
        <label for="ipGeoToggle" id="ipGeoLabel">🌍 GeoIP метка</label>
      </div>
      <input id="geoServiceInput" type="text" placeholder="https://ipwhois.app/json/{ip}" value="https://ipwhois.app/json/{ip}">
      <div class="status-area">
        <div class="spinner" id="spinner"></div>
        <span id="processStatus"></span>
      </div>
    </div>
    <div class="controls-row">
      <button id="btnCountry" title="Выбор страны">🌎</button>
      <button id="btnPing" title="Pinger">📡</button>
      <input id="filterInput" placeholder="фильтр / URL-подписка..." autocomplete="off">
      <button id="btnSettings">⚙️</button>
      <button id="btnFilter">🔍 Применить</button>
    </div>
    <div id="countryPopup"></div>
  </div>

  <div>
    <div class="label">📥 Исходный JSON / URL / текст</div>
    <textarea id="inputConfig" placeholder="Вставьте JSON, vmess://, vless://, subscription link..."></textarea>
  </div>
  <div style="margin-top: 1rem;">
    <div class="label">📤 Результат конвертации</div>
    <textarea id="outputResult" placeholder="Результат..."></textarea>
  </div>

  <div class="buttons-row">
    <div class="buttons-left">
      <button id="btnConvert">📄 JSON → URL</button>
      <button id="btnConvertBack">🔁 URL → JSON</button>
      <button id="btnTextBase64">📦 текст ↔ base64</button>
    </div>
    <div class="buttons-right">
      <button id="btnCopy">📋 Копировать</button>
      <button id="btnDownload">💾 Скачать</button>
      <button id="btnLoadFile">📂 Загрузить файл</button>
    </div>
  </div>
  <div class="clear-row">
    <button id="btnClearInput">🧹 Очистить ввод</button>
    <button id="btnClearOutput">🧹 Очистить результат</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".txt,.json,.yaml,.yml" style="display:none">
<a id="hiddenDownloadLink" style="display:none;"></a>

<!-- Модалка настроек (обновлённая вёрстка) -->
<div id="settingsModal">
  <div id="settingsContent">
    <h3>✏️ Замена/добавление Ws-Host</h3>
    <div class="settings-row">
      <input type="text" id="replaceWsHostInput" placeholder="Новый ws-host">
      <button id="btnReplaceWsHost">ОК</button>
    </div>
    <h3>✏️ Замена/добавление SNI</h3>
    <div class="settings-row">
      <input type="text" id="replaceSniInput" placeholder="Новый SNI">
      <button id="btnReplaceSni">ОК</button>
    </div>
    <h3>🏷️ Замена/добавление названия</h3>
    <div class="settings-row">
      <input type="text" id="replaceNameInput" placeholder="Новое название (сохранит пробелы)">
      <button id="btnReplaceName">ОК</button>
    </div>
    <div class="inline-check">
      <label><input type="checkbox" id="prependName"> <span>дописать в начало</span></label>
      <label><input type="checkbox" id="appendName"> <span>дописать в конец</span></label>
    </div>

    <div class="modal-actions">
      <button id="ipWsToggle">🌐 ip→to host</button>
      <button id="ipSniToggle">🔒 ip→to sni</button>
      <button id="btnDedup">♻️ Дедупликация</button>
      <button id="closeSettings">❌ Закрыть</button>
    </div>
  </div>
</div>

    (function(){ const btn = document.getElementById('ipWsToggle'); let toggled = false, orig = '', mod = ''; btn.addEventListener('click', () => { orig = orig || inEl.value.trim(); try { const parsed = JSON.parse(orig); parsed.outbounds.forEach(o => { const ws = o.streamSettings?.wsSettings?.headers?.Host || o.streamSettings?.httpSettings?.host?.[0] || o.streamSettings?.splithttpSettings?.host || ''; if (ws) { if (o.settings?.vnext?.[0]) { o._orig = o.settings.vnext[0].address; o.settings.vnext[0].address = ws; } else if (o.settings?.servers?.[0]) { o._orig = o.settings.servers[0].address; o.settings.servers[0].address = ws; } } }); mod = JSON.stringify(parsed, null, 2); } catch { mod = orig.split('\n').map(l => { try { const u = new URL(l); const ws = u.searchParams.get('host'); if (ws) { u.hostname = decodeURIComponent(ws); return u.toString(); } return l; } catch { return l; } }).join('\n'); } outEl.value = toggled ? orig : mod; toggled = !toggled; settingsModalLocal.style.display = 'none'; }); })();
    (function(){ const oldBtn = document.getElementById('ipSniToggle'); if (!oldBtn) return; const newBtn = oldBtn.cloneNode(true); oldBtn.parentNode.replaceChild(newBtn, oldBtn); newBtn.addEventListener('click', () => { const lines = inEl.value.split(/\r?\n/); const updated = lines.map(l => { try { const u = new URL(l); const p = new URLSearchParams(u.search); const rawSni = p.get('sni'); if (!rawSni) return l; let decodedSni; try { decodedSni = decodeURIComponent(rawSni); } catch { decodedSni = rawSni; } const oldHost = u.hostname; const m = decodedSni.match(/^(.+):(\d+)$/); if (m) { u.hostname = m[1]; u.port = m[2]; } else { u.hostname = decodedSni; } p.set('sni', oldHost); u.search = p.toString() ? `?${p.toString()}` : ''; return u.toString(); } catch (err) { return l; } }); outEl.value = updated.join('\n'); settingsModalLocal.style.display = 'none'; }); })();
    document.getElementById('btnDedup').addEventListener('click', () => { const raw = inEl.value.trim(); let output = ''; try { const cfg = JSON.parse(raw); if (Array.isArray(cfg.outbounds)) { const seen = new Set(); const deduped = cfg.outbounds.filter(o => { const copy = { ...o }; delete copy.tag; delete copy.remarks; const key = JSON.stringify(copy); if (seen.has(key)) return false; seen.add(key); return true; }); cfg.outbounds = deduped; output = JSON.stringify(cfg, null, 2); } else { throw ''; } } catch { const lines = raw.split(/\r?\n/).filter(Boolean); const seen = new Set(); const deduped = []; for (let line of lines) { const core = line.split('#')[0]; if (!seen.has(core)) { seen.add(core); deduped.push(line); } } output = deduped.join('\n'); } outEl.value = output; document.querySelector('#statusContainer #processStatus').innerHTML = 'дедупликация выполнена'; settingsModalLocal.style.display = 'none'; });
    (function(){ const btn = document.getElementById('btnConvert'); const orig = btn.onclick; btn.onclick = async function(...args) { await orig.apply(this, args); const raw = inEl.value; const partsSS = raw.split(/\u0002+/); const urlsSS = []; for (let p of partsSS) { const s = p.indexOf('{'), e = p.lastIndexOf('}'); if (s < 0 || e <= s) continue; try { const o = JSON.parse(p.slice(s, e + 1)); if (o.configType === 'SHADOWSOCKS' && o.method && o.password && o.server && o.serverPort) { urlsSS.push(toSS(o)); } } catch {} } if (urlsSS.length) { outEl.value += (outEl.value ? '\n' : '') + urlsSS.join('\n'); } const partsJT = raw.split(/\u0002+|\r?\n/); const urlsJT = []; for (let p of partsJT) { const s = p.indexOf('{'), e = p.lastIndexOf('}'); if (s < 0 || e <= s) continue; try { const o = JSON.parse(p.slice(s, e + 1)); if (o.configType === 'TROJAN') { const bean = o.outboundBean?.[0]; const srv = bean?.settings?.servers?.[0]; const ss2 = bean?.streamSettings || {}; if (srv) { const qp = new URLSearchParams(); qp.set('security', ss2.security || 'none'); qp.set('type', ss2.network || ''); urlsJT.push(`trojan://${encodeURIComponent(srv.password)}@${srv.address}:${srv.port}?${qp.toString()}`); } } if (o.configType === 'VLESS') { const bean = o.outboundBean?.[0]; const v = bean?.settings?.vnext?.[0]; const u = v?.users?.[0]; const ss2 = bean?.streamSettings || {}; if (v && u) { const qp = new URLSearchParams(); qp.set('encryption', u.encryption || 'none'); qp.set('security', ss2.security || 'none'); qp.set('type', ss2.network || ''); urlsJT.push(`vless://${u.id}@${v.address}:${v.port}?${qp.toString()}`); } } } catch {} } if (urlsJT.length) { outEl.value += (outEl.value ? '\n' : '') + urlsJT.join('\n'); } }; })();
    (function(){ const btn = document.getElementById('btnConvert'); const orig2 = btn.onclick; btn.onclick = async function(...args) { await orig2.apply(this, args); const lines = inEl.value.trim().split(/\r?\n/).filter(Boolean); const wgLines = lines.filter(l => l.startsWith('wireguard://')); if (wgLines.length) { const iniBlocks = wgLines.map(parseWireguardToIni).filter(Boolean); outEl.value += (outEl.value ? '\n\n' : '') + iniBlocks.join('\n\n'); } const iniText = inEl.value.trim(); if (iniText.startsWith('[Interface]')) { const url = parseIniToWireguard(iniText); outEl.value += (outEl.value ? '\n' : '') + url; } }; })();
